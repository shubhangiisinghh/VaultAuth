version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vaultauth-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vaultauth
    ports:
      - "3306:3306"
    volumes:
      - vaultauth-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./vaultauth-backend
      dockerfile: Dockerfile
    container_name: vaultauth-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vaultauth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      VAULTAUTH_FRONTEND_URL: http://localhost:5173
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./vaultauth-frontend
      dockerfile: Dockerfile
    container_name: vaultauth-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  vaultauth-data:
