spring.application.name=vaultauth

# --- Database ---
spring.datasource.url=jdbc:mysql://localhost:3306/vaultauth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Session ---
server.servlet.session.timeout=30m

# --- App config ---
vaultauth.frontend.url=http://localhost:5173

# --- Server ---
server.port=8080
